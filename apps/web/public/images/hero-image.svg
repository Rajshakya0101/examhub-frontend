<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc" />
  
  <!-- Decorative elements -->
  <circle cx="500" cy="80" r="120" fill="#f0f9ff" />
  <circle cx="100" cy="320" r="150" fill="#eff6ff" />
  
  <!-- Laptop -->
  <g transform="translate(300, 200) scale(0.9)">
    <!-- Laptop base -->
    <rect x="-150" y="30" width="300" height="20" rx="5" fill="#334155" />
    
    <!-- Laptop screen -->
    <rect x="-140" y="-120" width="280" height="150" rx="5" fill="#334155" />
    <rect x="-130" y="-110" width="260" height="130" rx="3" fill="#f8fafc" />
    
    <!-- Screen content -->
    <rect x="-120" y="-100" width="240" height="20" rx="3" fill="#e2e8f0" />
    <rect x="-120" y="-70" width="180" height="10" rx="2" fill="#e2e8f0" />
    <rect x="-120" y="-50" width="210" height="10" rx="2" fill="#e2e8f0" />
    <rect x="-120" y="-30" width="150" height="10" rx="2" fill="#e2e8f0" />
    <rect x="-120" y="-10" width="190" height="10" rx="2" fill="#e2e8f0" />
    <rect x="-120" y="10" width="170" height="10" rx="2" fill="#e2e8f0" />
    
    <!-- Charts and UI elements -->
    <rect x="70" y="-80" width="40" height="40" rx="5" fill="url(#grad2)" />
    <circle cx="90" cy="-60" r="15" fill="#f8fafc" stroke="#60a5fa" stroke-width="3" />
    <rect x="70" y="-30" width="40" height="10" rx="2" fill="#e2e8f0" />
    <rect x="70" y="-10" width="25" height="10" rx="2" fill="#e2e8f0" />
  </g>

  <!-- Books/Notes -->
  <g transform="translate(140, 220) rotate(-10)">
    <rect x="-60" y="-15" width="120" height="30" rx="2" fill="#60a5fa" />
    <rect x="-55" y="-10" width="110" height="20" fill="#f8fafc" />
    <line x1="-40" y1="-5" x2="40" y2="-5" stroke="#cbd5e1" stroke-width="1" />
    <line x1="-40" y1="0" x2="20" y2="0" stroke="#cbd5e1" stroke-width="1" />
    <line x1="-40" y1="5" x2="30" y2="5" stroke="#cbd5e1" stroke-width="1" />
  </g>
  
  <!-- Chart visualization -->
  <g transform="translate(450, 220)">
    <rect x="-50" y="-60" width="100" height="120" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" />
    <text x="0" y="-40" font-family="Arial" font-size="10" text-anchor="middle" fill="#334155">Progress</text>
    
    <!-- Bar chart -->
    <rect x="-30" y="-20" width="10" height="60" fill="#3b82f6" rx="2" />
    <rect x="-10" y="-30" width="10" height="70" fill="#8b5cf6" rx="2" />
    <rect x="10" y="-40" width="10" height="80" fill="#3b82f6" rx="2" />
    <rect x="30" y="-25" width="10" height="65" fill="#8b5cf6" rx="2" />
  </g>

  <!-- Student character -->
  <g transform="translate(120, 150)">
    <!-- Head -->
    <circle cx="0" cy="0" r="30" fill="#fcd34d" />
    <ellipse cx="0" cy="10" rx="15" ry="10" fill="#fef3c7" />
    
    <!-- Eyes -->
    <circle cx="-10" cy="-5" r="3" fill="#334155" />
    <circle cx="10" cy="-5" r="3" fill="#334155" />
    
    <!-- Smile -->
    <path d="M -10 15 Q 0 25 10 15" fill="none" stroke="#334155" stroke-width="2" />
    
    <!-- Hair -->
    <path d="M -25 -10 Q -20 -40 0 -35 Q 20 -40 25 -10" fill="#78350f" />
  </g>

  <!-- Abstract shapes -->
  <circle cx="500" cy="340" r="25" fill="url(#grad1)" opacity="0.7" />
  <circle cx="480" cy="300" r="15" fill="#a78bfa" opacity="0.6" />
  <circle cx="530" cy="310" r="10" fill="#3b82f6" opacity="0.8" />
  
  <circle cx="100" cy="80" r="20" fill="url(#grad1)" opacity="0.7" />
  <circle cx="80" cy="50" r="12" fill="#a78bfa" opacity="0.6" />
  <circle cx="130" cy="60" r="8" fill="#3b82f6" opacity="0.8" />
</svg>