<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f5f5f5" />
  
  <!-- Laptop Base -->
  <rect x="150" y="300" width="500" height="30" rx="5" fill="#333" />
  <rect x="175" y="150" width="450" height="280" rx="10" fill="#555" />
  <rect x="195" y="170" width="410" height="240" rx="5" fill="#f0f0f0" />
  
  <!-- Screen Content (Exam App UI) -->
  <rect x="215" y="190" width="370" height="30" rx="3" fill="#7c3aed" />
  
  <!-- Navigation Icons -->
  <circle cx="230" cy="205" r="5" fill="#ffffff" />
  <circle cx="250" cy="205" r="5" fill="#ffffff" />
  <circle cx="270" cy="205" r="5" fill="#ffffff" />
  
  <!-- Content Elements -->
  <rect x="215" y="230" width="230" height="20" rx="3" fill="#333" />
  <rect x="215" y="260" width="180" height="15" rx="3" fill="#666" />
  <rect x="215" y="285" width="200" height="15" rx="3" fill="#666" />
  
  <!-- Question Box -->
  <rect x="215" y="310" width="370" height="80" rx="5" fill="#eef2ff" stroke="#7c3aed" stroke-width="2" />
  <rect x="230" y="325" width="340" height="10" rx="2" fill="#333" />
  <rect x="230" y="345" width="320" height="10" rx="2" fill="#333" />
  <rect x="230" y="365" width="280" height="10" rx="2" fill="#333" />
  
  <!-- Progress Bar -->
  <rect x="485" y="260" width="100" height="15" rx="7" fill="#e0e0e0" />
  <rect x="485" y="260" width="65" height="15" rx="7" fill="url(#grad1)" />
  
  <!-- Chart Element -->
  <rect x="485" y="285" width="100" height="60" rx="3" fill="#f9f9f9" stroke="#ddd" stroke-width="1" />
  <line x1="495" y1="335" x2="575" y2="335" stroke="#ddd" />
  <line x1="495" y1="315" x2="575" y2="315" stroke="#ddd" />
  <line x1="495" y1="295" x2="575" y2="295" stroke="#ddd" />
  
  <!-- Chart Bars -->
  <rect x="505" y="315" width="10" height="20" fill="#7c3aed" />
  <rect x="525" y="305" width="10" height="30" fill="#7c3aed" />
  <rect x="545" y="325" width="10" height="10" fill="#7c3aed" />
  <rect x="565" y="295" width="10" height="40" fill="#7c3aed" />
  
  <!-- Abstract Elements -->
  <circle cx="50" cy="50" r="80" fill="rgba(124, 58, 237, 0.1)" />
  <circle cx="750" cy="450" r="100" fill="rgba(236, 72, 153, 0.1)" />
</svg>